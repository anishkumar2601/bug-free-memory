<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GameHub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:#0b0f1a;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 40px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10}
.logo{font-size:24px;font-weight:600}
nav a{margin:0 15px;color:#ccc;text-decoration:none}
nav a:hover{color:#fff}
.hero{height:60vh;position:relative;overflow:hidden}
.slide{position:absolute;width:100%;height:100%;background-size:cover;background-position:center;opacity:0;transition:opacity 1s}
.slide.active{opacity:1}
.hero-content{position:absolute;bottom:30px;left:40px}
.hero h1{font-size:40px}
.btn{padding:10px 20px;background:#00aaff;border:none;color:#fff;cursor:pointer;margin-top:10px}
.container{padding:40px}
.section-title{margin-bottom:20px;font-size:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:20px}
.card{background:#141a2b;border-radius:10px;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s}
.card:hover{transform:scale(1.05);box-shadow:0 0 15px rgba(0,170,255,0.5)}
.card img{width:100%;height:250px;object-fit:cover}
.card-content{padding:10px}
.price{color:#0f0}
.discount{color:#f00;font-size:12px}
.sidebar{position:fixed;left:0;top:70px;width:200px;height:100%;background:#111;padding:20px}
.search{margin:20px 0}
input{width:100%;padding:8px;border:none;border-radius:5px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center}
.modal-content{background:#222;padding:20px;border-radius:10px;width:300px}
.close{float:right;cursor:pointer}
.toggle{cursor:pointer}
.light{background:#f5f5f5;color:#000}
@media(max-width:768px){
.sidebar{display:none}
header{padding:10px}
}
</style>
</head>
<body>

<header>
<div class="logo">GameHub</div>
<nav>
<a href="#">Store</a>
<a href="#">Library</a>
<a href="#">Community</a>
<a href="#">Profile</a>
<i class="fa fa-moon toggle"></i>
</nav>
</header>

<div class="hero">
<div class="slide active" style="background-image:url('https://picsum.photos/1200/600?1')"></div>
<div class="slide" style="background-image:url('https://picsum.photos/1200/600?2')"></div>
<div class="slide" style="background-image:url('https://picsum.photos/1200/600?3')"></div>
<div class="hero-content">
<h1>Featured Game</h1>
<button class="btn">Buy Now</button>
</div>
</div>

<div class="sidebar">
<h3>Filters</h3>
<div class="search">
<input type="text" id="search" placeholder="Search games...">
</div>
<p>Genre</p>
<p>Action</p>
<p>RPG</p>
<p>FPS</p>
</div>

<div class="container">
<h2 class="section-title">Trending</h2>
<div class="grid" id="games"></div>
</div>

<div class="modal" id="modal">
<div class="modal-content">
<span class="close">&times;</span>
<h2 id="modalTitle"></h2>
<p>Game details...</p>
</div>
</div>

<script>
const games=[
{name:"Cyber War",price:"$40"},
{name:"Sky Legends",price:"$50"},
{name:"Racing Pro",price:"$30"},
{name:"Battle Arena",price:"$60"},
{name:"Zombie Land",price:"$20"},
{name:"Galaxy Quest",price:"$45"},
{name:"Sniper Elite",price:"$35"},
{name:"Dragon World",price:"$55"},
{name:"Speed Rush",price:"$25"},
{name:"Shadow Ops",price:"$70"},
{name:"Mystic RPG",price:"$65"},
{name:"Warzone X",price:"$50"}
];

const grid=document.getElementById("games");
games.forEach(g=>{
let card=document.createElement("div");
card.className="card";
card.innerHTML=`
<img src="https://picsum.photos/200/300?random=${Math.random()}">
<div class="card-content">
<h4>${g.name}</h4>
<p class="price">${g.price}</p>
<p class="discount">-20%</p>
</div>`;
card.onclick=()=>openModal(g.name);
grid.appendChild(card);
});

function openModal(name){
document.getElementById("modal").style.display="flex";
document.getElementById("modalTitle").innerText=name;
}
document.querySelector(".close").onclick=()=>document.getElementById("modal").style.display="none";

let slides=document.querySelectorAll(".slide");
let index=0;
setInterval(()=>{
slides[index].classList.remove("active");
index=(index+1)%slides.length;
slides[index].classList.add("active");
},3000);

document.getElementById("search").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();
document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(val)?"block":"none";
});
});

document.querySelector(".toggle").onclick=()=>{
document.body.classList.toggle("light");
};
</script>

</body>
</html>
